version: '3.8'

services:
  # Apache Kafka + Kafka UI
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - retail-network
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      # Wait for Kafka to be ready
      echo 'Waiting for Kafka to be ready...'
      sleep 10

      # Create topics
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.orders
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.payments
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.inventory
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.delivery
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.fraud_signals
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.customer_profile
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.recommendations
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --replication-factor 1 --partitions 3 --topic retail.customer_behavior

      echo 'Topics created!'
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - retail-network

  # Python Data Generator
  python-data-generator:
    build:
      context: ./data-generator
      dockerfile: Dockerfile
    container_name: python-data-generator
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    networks:
      - retail-network

  # Apache Flink (Job Manager + Task Manager)
  jobmanager:
    image: flink:1.17.1
    container_name: flink-jobmanager
    ports:
      - "8087:8081"
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: s3a://warehouse/flink-checkpoints
        state.savepoints.dir: s3a://warehouse/flink-savepoints
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/taskmanagers || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  taskmanager:
    image: flink:1.17.1
    container_name: flink-taskmanager
    depends_on:
      jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.backend: rocksdb
    networks:
      - retail-network

  # Flink Python Stream Processor
  flink-jobs:
    build:
      context: ./flink-jobs
      dockerfile: Dockerfile
    container_name: flink-jobs
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ICEBERG_REST_URL: http://iceberg-rest:8181
      WAREHOUSE: s3a://warehouse/
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: password
    networks:
      - retail-network
    restart: unless-stopped

  # Apache Spark with Iceberg (handles Kafka -> Iceberg streaming)
  spark-iceberg:
    image: tabulario/spark-iceberg:latest
    hostname: spark-iceberg
    container_name: spark-iceberg
    ports:
      - "8889:8888"
      - "8083:8080"
      - "10002:10000"
      - "10003:10001"
    environment:
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
    volumes:
      - ./spark/jobs:/opt/spark/jobs
      - ./spark/aws:/opt/spark/aws:ro
    extra_hosts:
      - "warehouse.minio:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - retail-network

  # MinIO (S3 Compatible)
  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Iceberg REST Catalog (Tabulario - for Trino and Spark)
  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    hostname: iceberg-rest
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3://warehouse/wh/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: admin
      AWS_SECRET_ACCESS_KEY: password
      AWS_REGION: us-east-1
    networks:
      retail-network:
        aliases:
          - rest
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/namespaces || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # PostgreSQL
  postgres:
    image: postgres:15
    hostname: postgres
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retaildb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/postgres_seed.sql:/docker-entrypoint-initdb.d/seed.sql
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U retail"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL (for OpenMetadata)
  mysql:
    image: mysql:8.0
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: openmetadata
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin123
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Elasticsearch (for OpenMetadata)
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    networks:
      - retail-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - retail-network

  # Trino
  trino:
    image: trinodb/trino:448
    container_name: trino
    ports:
      - "8082:8080"
    volumes:
      - ./trino/etc:/etc/trino
    depends_on:
      iceberg-rest:
        condition: service_started
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - retail-network

  # GraphQL API
  graphql-api:
    build:
      context: ./graphql-api
      dockerfile: Dockerfile
    container_name: graphql-api
    ports:
      - "4000:4000"
    environment:
      TRINO_HOST: trino
      TRINO_PORT: 8080
    depends_on:
      trino:
        condition: service_started
    networks:
      - retail-network

  # Next.js UI
  nextjs-ui:
    build:
      context: ./nextjs-ui
      dockerfile: Dockerfile
    container_name: nextjs-ui
    ports:
      - "3000:3000"
    environment:
      GRAPHQL_API_URL: http://graphql-api:4000
    depends_on:
      graphql-api:
        condition: service_started
    networks:
      - retail-network

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      trino:
        condition: service_started
    networks:
      - retail-network

  # OpenMetadata
  openmetadata:
    image: openmetadata/server:1.2.1
    container_name: openmetadata
    ports:
      - "8585:8585"
    environment:
      OPENMETADATA_AIRFLOW_HOST: http://openmetadata:8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: admin
      DB_PASSWORD: admin123
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200
    depends_on:
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - retail-network

  # Data Quality Scanner
  data-quality:
    image: python:3.11-slim
    container_name: data-quality
    volumes:
      - ./scripts:/scripts
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      bash -c "pip install trino -q && python /scripts/soda_scan.py"
    depends_on:
      trino:
        condition: service_started
    networks:
      - retail-network
    restart: "no"

  # Benchmark Tool
  benchmark:
    image: python:3.11-slim
    container_name: benchmark
    volumes:
      - ./scripts:/scripts
      - ./docs:/docs
    environment:
      PYTHONUNBUFFERED: "1"
    command: >
      bash -c "pip install trino -q && python /scripts/benchmark.py"
    depends_on:
      trino:
        condition: service_started
      kafka:
        condition: service_started
    networks:
      - retail-network
    restart: "no"

  # Cube.js Semantic Layer
  cube:
    image: cubejs/cube:latest
    platform: linux/amd64
    container_name: cube
    ports:
      - "4000:4000"
      - "15432:15432"
    environment:
      CUBEJS_DEV_MODE: "true"
      CUBEJS_API_SECRET: cube-api-secret-change-in-production
      CUBEJS_DB_TYPE: trino
      CUBEJS_DB_HOST: trino
      CUBEJS_DB_PORT: "8080"
      CUBEJS_DB_USER: admin
      CUBEJS_DB_CATALOG: iceberg
      CUBEJS_DB_SCHEMA: retail
      CUBEJS_DB_SSL: "false"
      CUBEJS_CUBESTORE_HOST: cubestore
      CUBEJS_CUBESTORE_PORT: "1337"
      CUBEJS_CONCURRENCY: "8"
      CUBEJS_PRE_AGGREGATIONS_SCHEMA: pre_aggregations
    volumes:
      - ./cube/model:/cube/conf/model:ro
      - ./cube.js:/cube/conf/cube.js:ro
    depends_on:
      trino:
        condition: service_started
      cubestore:
        condition: service_started
    networks:
      - retail-network
    restart: unless-stopped

  cubestore:
    image: cubejs/cubestore:latest
    platform: linux/amd64
    container_name: cubestore
    ports:
      - "1337:1337"
    environment:
      CUBEJS_CUBESTORE_PORT: "1337"
    volumes:
      - cubestore-data:/cube/data
    networks:
      - retail-network
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
  grafana-data:
  prometheus-data:
  cubestore-data:

networks:
  retail-network:
    driver: bridge
