version: '3.8'

services:
  # Apache Kafka + Kafka UI
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - retail-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
    networks:
      - retail-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - retail-network

  # Apache Flink
  jobmanager:
    image: flink:1.17.1
    container_name: flink-jobmanager
    ports:
      - "8083:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        state.backend: rocksdb
    networks:
      - retail-network

  taskmanager:
    image: flink:1.17.1
    container_name: flink-taskmanager
    depends_on:
      - jobmanager
    command: taskmanager
    scale: 1
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: jobmanager
        taskmanager.numberOfTaskSlots: 2
        state.backend: rocksdb
    networks:
      - retail-network

  # MinIO (S3 Compatible)
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - retail-network

  # Apache Iceberg REST Catalog
  iceberg-rest:
    image: tabulario/iceberg-rest:0.2.0
    container_name: iceberg-rest
    ports:
      - "8181:8181"
    environment:
      CATALOG_WAREHOUSE: s3a://warehouse/
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_ACCESS-KEY: minioadmin
      CATALOG_S3_SECRET-KEY: minioadmin123
    networks:
      - retail-network

  # PostgreSQL
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: retail
      POSTGRES_PASSWORD: retail123
      POSTGRES_DB: retaildb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - retail-network

  # Trino
  trino:
    image: trinodb/trino:408
    container_name: trino
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
    depends_on:
      - iceberg-rest
      - minio
      - postgres
    networks:
      - retail-network

  # GraphQL API
  graphql-api:
    build:
      context: ./graphql-api
      dockerfile: Dockerfile
    container_name: graphql-api
    ports:
      - "4000:4000"
    environment:
      TRINO_HOST: trino
      TRINO_PORT: 8080
    depends_on:
      - trino
    networks:
      - retail-network

  # Next.js UI
  nextjs-ui:
    build:
      context: ./nextjs-ui
      dockerfile: Dockerfile
    container_name: nextjs-ui
    ports:
      - "3000:3000"
    environment:
      GRAPHQL_API_URL: http://graphql-api:4000
    depends_on:
      - graphql-api
    networks:
      - retail-network

  # Grafana
  grafana:
    image: grafana/grafana:10.2
    container_name: grafana
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - trino
    networks:
      - retail-network

  # OpenMetadata
  openmetadata:
    image: openmetadata/server:1.2.1
    container_name: openmetadata
    ports:
      - "8585:8585"
    environment:
      OPENMETADATA_AIRFLOW_HOST: http://openmetadata:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: retail
      DB_PASSWORD: retail123
    networks:
      - retail-network

  # Hive Metastore
  hive-metastore:
    image: cloudera/hive:2.1.1
    container_name: hive-metastore
    ports:
      - "9083:9083"
    environment:
      METASTORE_DB_HOST: postgres
      METASTORE_DB_PORT: 5432
      METASTORE_DB_USER: retail
      METASTORE_DB_PASSWORD: retail123
    depends_on:
      - postgres
    networks:
      - retail-network

volumes:
  minio-data:
  postgres-data:
  grafana-data:

networks:
  retail-network:
    driver: bridge